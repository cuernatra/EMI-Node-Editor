name: Static Analysis

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

jobs:
  cppcheck:
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libsfml-dev libxrandr-dev libxcursor-dev libudev-dev \
            libfreetype-dev libopenal-dev libflac-dev libvorbis-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            cppcheck

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-deps-${{ hashFiles('dependencies/**/CMakeLists.txt', 'tests/CMakeLists.txt') }}

      - name: Configure (generate compile_commands.json)
        run: |
          cmake -S . -B $BUILD_DIR \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTS=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run cppcheck
        run: |
          mkdir -p $BUILD_DIR/cppcheck
          set -o pipefail
          cppcheck \
            --project=$BUILD_DIR/compile_commands.json \
            -iEMI-Script \
            -idependencies \
            -ibuild \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            --suppress=unmatchedSuppression \
            --template=gcc \
            --cppcheck-build-dir=$BUILD_DIR/cppcheck 2>&1 | tee $BUILD_DIR/cppcheck/report.txt

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: ${{ env.BUILD_DIR }}/cppcheck/report.txt
