name: Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build ccache \
            libsfml-dev libxrandr-dev libxcursor-dev libudev-dev \
            libfreetype-dev libopenal-dev libflac-dev libvorbis-dev \
            libgl1-mesa-dev libegl1-mesa-dev

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-deps-${{ hashFiles('dependencies/**/CMakeLists.txt', 'tests/CMakeLists.txt') }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/*.cpp','**/*.h','**/*.hpp') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure
        run: |
          cmake -S . -B $BUILD_DIR \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTS=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build $BUILD_DIR

      - name: Test
        run: ctest --test-dir $BUILD_DIR --parallel $(nproc) --output-on-failure
